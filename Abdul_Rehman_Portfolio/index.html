<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>abdul_rehman_portfolio</title>

    <style>

        body {
            background-color: #0b1326;
            color: #dae2fd;
            -webkit-font-smoothing: antialiased;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }
        .glow-blue {
            box-shadow: 0 0 20px -5px rgba(37, 99, 235, 0.4);
        }
        .glow-green {
            box-shadow: 0 0 20px -5px rgba(78, 222, 163, 0.3);
        }
        .technical-chip {
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.05em;
        }
        .mesh-gradient {
            background: radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.15) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, rgba(78, 222, 163, 0.1) 0px, transparent 50%);
        }
        .scroll-indicator {
            height: 2px;
            background: linear-gradient(to right, #2563eb, #4edea3);
            width: 0%;
            transition: width 0.1s;
        }
    </style>
  </head>
  <body >
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
